<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agrinho Tech - Sustentabilidade e Educação</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="main-container">
    
    <!-- CARD 1: CALCULADORA SUSTENTÁVEL DO AGRINHO -->
    <section class="card">
      <h2>🌱 Calculadora AgroSustentável</h2>
      <p class="subtitulo">Descubra a economia de recursos no campo</p>
      
      <div class="input-group">
        <label for="txt-area">Área da propriedade (em hectares):</label>
        <input type="number" id="txt-area" min="1" placeholder="Ex: 50">
      </div>

      <fieldset class="checkbox-container">
        <legend>Práticas Adotadas</legend>
        
        <div class="checkbox-group">
          <input type="checkbox" id="chk-direto">
          <label for="chk-direto">Plantio Direto (Proteção do solo)</label>
        </div>
        
        <div class="checkbox-group">
          <input type="checkbox" id="chk-gotejamento">
          <label for="chk-gotejamento">Irrigação por Gotejamento (Economia de água)</label>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="chk-solar">
          <label for="chk-solar">Uso de Energia Solar na propriedade</label>
        </div>
      </fieldset>

      <button class="btn-agro" onclick="calcularSustentabilidade()">Calcular Impacto</button>

      <!-- Indicador Visual do Impacto Ecológico -->
      <div class="container-resultado">
        <span id="texto-impacto" class="texto-resultado">Aguardando dados da propriedade...</span>
        <div class="barra-bg">
          <div id="barra-impacto" class="barra-progresso"></div>
        </div>
      </div>
    </section>

    <!-- CARD 2: QUIZ DO AGRINHO -->
    <section class="card">
      <h2>🌾 Quiz Campo & Cidade</h2>
      <p class="subtitulo">Teste seus conhecimentos sobre o agronegócio sustentável</p>
      
      <div id="quiz-container">
        <p id="pergunta-texto" class="pergunta">Carregando pergunta...</p>
        
        <div class="opcoes-container">
          <button class="btn-opcao" onclick="verificarResposta(0)" id="op0">Opção A</button>
          <button class="btn-opcao" onclick="verificarResposta(1)" id="op1">Opção B</button>
          <button class="btn-opcao" onclick="verificarResposta(2)" id="op2">Opção C</button>
        </div>
      </div>

      <div class="container-resultado">
        <span id="texto-quiz" class="texto-resultado">Pontuação: 0</span>
        <button id="btn-reiniciar" class="btn-agro" style="display:none; margin-top: 10px;" onclick="reiniciarQuiz()">Jogar Novamente</button>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
